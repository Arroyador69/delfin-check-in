<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Delfín Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        .login-form {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-message {
            background-color: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }
        .success-message {
            background-color: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo y Título -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🐬</div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Delfín Check-in</h1>
            <p class="text-gray-600">Panel de Administración</p>
        </div>

        <!-- Formulario de Login -->
        <div class="login-form p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Iniciar Sesión</h2>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Usuario
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="form-input"
                        placeholder="admin"
                        autocomplete="username"
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="form-input"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    />
                </div>
                
                <button
                    type="submit"
                    class="btn-login w-full"
                >
                    Acceder al Dashboard
                </button>
            </form>

            <!-- Mensajes de Estado -->
            <div id="errorMessage" class="error-message">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium">
                            Usuario o contraseña incorrectos. Inténtelo de nuevo.
                        </p>
                    </div>
                </div>
            </div>

            <div id="successMessage" class="success-message">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium">
                            ¡Acceso correcto! Redirigiendo al dashboard...
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Información de Seguridad -->
        <div class="text-center mt-6">
            <p class="text-sm text-gray-500">
                🔒 Acceso restringido solo para administradores autorizados
            </p>
        </div>
    </div>

    <script>
        // Credenciales de administrador
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'Cuaderno2314'
        };

        // Función para verificar credenciales
        function checkCredentials(username, password) {
            return username === ADMIN_CREDENTIALS.username && 
                   password === ADMIN_CREDENTIALS.password;
        }

        // Función para mostrar mensajes
        function showMessage(type, show) {
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            if (type === 'error') {
                errorMsg.style.display = show ? 'block' : 'none';
                successMsg.style.display = 'none';
            } else if (type === 'success') {
                successMsg.style.display = show ? 'block' : 'none';
                errorMsg.style.display = 'none';
            }
        }

        // Función para redirigir al dashboard
        function redirectToDashboard() {
            // Redirigir al dashboard principal de Vercel
            window.location.href = '/guest-registrations-dashboard';
        }

        // Manejar envío del formulario
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Ocultar mensajes anteriores
            showMessage('error', false);
            showMessage('success', false);
            
            // Verificar credenciales
            if (checkCredentials(username, password)) {
                // Credenciales correctas
                showMessage('success', true);
                
                // Redirigir después de 1.5 segundos
                setTimeout(() => {
                    redirectToDashboard();
                }, 1500);
                
                // Limpiar formulario
                document.getElementById('loginForm').reset();
                
            } else {
                // Credenciales incorrectas
                showMessage('error', true);
                
                // Limpiar contraseña
                document.getElementById('password').value = '';
                
                // Enfocar contraseña
                document.getElementById('password').focus();
            }
        });

        // Ocultar mensajes al escribir
        document.getElementById('username').addEventListener('input', function() {
            showMessage('error', false);
            showMessage('success', false);
        });
        
        document.getElementById('password').addEventListener('input', function() {
            showMessage('error', false);
            showMessage('success', false);
        });

        // Enfocar usuario al cargar
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
