name: Trigger Vercel Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Deploy Hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set" >&2
            exit 1
          fi
          curl -fsS -X POST "$HOOK"


