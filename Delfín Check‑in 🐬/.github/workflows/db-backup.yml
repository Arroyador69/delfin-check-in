name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *' # Todos los días a las 03:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    permissions:
      contents: write # necesario para commitear los backups
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backups directory
        run: mkdir -p backups

      - name: Fetch and compress export
        env:
          EXPORT_URL: ${{ secrets.BACKUP_EXPORT_URL }}
        run: |
          if [ -z "$EXPORT_URL" ]; then
            echo "BACKUP_EXPORT_URL secret is not set" >&2
            exit 1
          fi
          timestamp=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          curl -fsSL "$EXPORT_URL" -o "backups/backup-$timestamp.json"
          gzip -9 "backups/backup-$timestamp.json"
          ls -lah backups

      - name: Commit and push backups
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(backup): add daily database backup"
          branch: main
          file_pattern: backups/*.json.gz


