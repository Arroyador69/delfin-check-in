# Despliegue automático: solo lo que usamos en producción (Vercel).
# Heroku / Render / Docker / Telegram / Railway se quitaron: eran plantilla u opciones
# no usadas y fallaban por secretos inexistentes. Si más adelante migráis backend,
# añadid un job nuevo con sus credenciales en GitHub Secrets.

name: Deploy Delfín Check-in

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '24.x'
  # Opt-in ya a Node 24 para acciones JS (GitHub eliminará Node 20 en runners en 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint -- --quiet

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

  deploy-vercel:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      # Versión fija: `latest` (p. ej. CLI 51.x) ha provocado "DeploymentError: unexpected internal error" en CI.
      # 47.2.2 es compatible con la API de Vercel y estable en despliegues.
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          vercel-version: 47.2.2
