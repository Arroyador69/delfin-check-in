name: Deploy Delfín Check-in

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18.x'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Run tests
      run: npm test
      env:
        NODE_ENV: test
    
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

  deploy-vercel:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

  # Desactivado hasta MVP/backend en Railway (evita fallos sin proyecto enlazado + RAILWAY_TOKEN).
  deploy-railway:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && false
    
    steps:
    - uses: actions/checkout@v4
    
    # CLI npm oficial (@railway/cli). La acción railway/deploy@v1 no existe en GitHub.
    - name: Deploy to Railway
      run: npx --yes @railway/cli up --ci --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}

  deploy-heroku:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.12.14
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}

  deploy-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/delfin-checkin:latest
          ${{ secrets.DOCKER_USERNAME }}/delfin-checkin:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  notify-telegram:
    needs: [deploy-vercel, deploy-render, deploy-heroku, deploy-docker]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 **Deploy completado**
          
          ✅ Aplicación: Delfín Check-in
          📅 Fecha: ${{ github.event.head_commit.timestamp }}
          🔗 Commit: ${{ github.sha }}
          👤 Autor: ${{ github.event.head_commit.author.name }}
          
          🌐 URLs:
          • Vercel: https://delfin-checkin.vercel.app
          • Railway: https://delfin-checkin.railway.app
          • Render: https://delfin-checkin.onrender.com
          • Heroku: https://delfin-checkin.herokuapp.com
          
          📦 Docker: ${{ secrets.DOCKER_USERNAME }}/delfin-checkin:${{ github.sha }}

  deploy-vercel-hook:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Trigger Vercel Deploy Hook
      env:
        HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$HOOK" ]; then
          echo "VERCEL_DEPLOY_HOOK_URL not set" >&2
          exit 1
        fi
        curl -fsS -X POST "$HOOK"
