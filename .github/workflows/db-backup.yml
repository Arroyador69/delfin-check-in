name: Daily Database Backup

on:
  schedule:
    - cron: "0 3 * * *"  # Diario 03:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backups directory
        run: mkdir -p backups

      - name: Fetch and compress export (with retries)
        env:
          EXPORT_URL: ${{ secrets.BACKUP_EXPORT_URL }}
        run: |
          if [ -z "$EXPORT_URL" ]; then
            echo "BACKUP_EXPORT_URL secret is not set" >&2
            exit 1
          fi
          timestamp=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          target="backups/backup-$timestamp.json"
          echo "Downloading from: $EXPORT_URL"
          curl -fsS --retry 5 --retry-delay 5 "$EXPORT_URL" -o "$target"
          # Tamaño mínimo para considerar válido
          if [ ! -s "$target" ]; then
            echo "Empty backup file" >&2
            exit 2
          fi
          gzip -9 "$target"
          ls -lah backups

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push backups
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(backup): add daily database backup"
          branch: main
          file_pattern: backups/*.json.gz
